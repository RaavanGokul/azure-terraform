trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.6.6'

stages:

# -------------------------
# PLAN STAGE
# -------------------------
- stage: Terraform_Plan
  displayName: "Terraform Plan"
  jobs:
  - job: Plan
    steps:

    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: $(terraformVersion)

    # (Optional) If using SSH key from pipeline variable
    # Make sure SSH_PUBLIC_KEY exists in pipeline variables
    - script: |
        echo "Using SSH Key from pipeline variable"
      displayName: "Validate SSH Key وجود"

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'azure-conn'
        backendAzureRmResourceGroupName: 'rg-tfstate'
        backendAzureRmStorageAccountName: 'mystatefilegkinfra'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'azure-conn'
        commandOptions: >
          -var="ssh_public_key=$(SSH_PUBLIC_KEY)" -var-file=terraform.tfvars -out=tfplan

    - publish: tfplan
      artifact: tfplan

# -------------------------
# APPLY STAGE
# -------------------------
- stage: Terraform_Apply
  displayName: "Terraform Apply"
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - job: Apply
    steps:

    - download: current
      artifact: tfplan

    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'azure-conn'
        backendAzureRmResourceGroupName: 'rg-tfstate'
        backendAzureRmStorageAccountName: 'mystatefilegkinfra'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'azure-conn'
        commandOptions: 'tfplan'
