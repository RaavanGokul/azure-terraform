trigger:
- main

pool:
  name: gk # your self-hosted agent

variables:
  terraformVersion: '1.6.6'

stages:

# -------------------------
# PLAN STAGE
# -------------------------
- stage: Terraform_Plan
  displayName: "Terraform Plan"

  jobs:
  - job: Plan
    steps:

    # Install Terraform (Mac ARM)
    - script: |
        if ! command -v terraform &> /dev/null
        then
          echo "Installing Terraform..."
          curl -O https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_darwin_arm64.zip
          unzip terraform_$(terraformVersion)_darwin_arm64.zip
          sudo mv terraform /usr/local/bin/
        fi
        terraform version
      displayName: "Install Terraform"

    # Azure Login
    - script: |
        az login --service-principal \
          -u $(ARM_CLIENT_ID) \
          -p $(ARM_CLIENT_SECRET) \
          --tenant $(ARM_TENANT_ID)

        az account set --subscription $(ARM_SUBSCRIPTION_ID)
      displayName: "Azure Login"

    # Terraform Init
    - script: |
        terraform init \
          -backend-config="resource_group_name=rg-tfstate" \
          -backend-config="storage_account_name=mystatefilegkinfra" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=terraform.tfstate"
      displayName: "Terraform Init"

    # Validate
    - script: terraform validate
      displayName: "Terraform Validate"

    # Plan
    - script: |
        terraform plan \
          -var="vm_username=$(VM_USERNAME)" \
          -var="vm_password=$(VM_PASSWORD)" \
          -out=tfplan
      displayName: "Terraform Plan"

    # Publish plan
    - publish: tfplan
      artifact: tfplan

# -------------------------
# APPLY STAGE
# -------------------------
- stage: Terraform_Apply
  displayName: "Terraform Apply"
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - job: Apply
    steps:

    - download: current
      artifact: tfplan

    # Azure Login
    - script: |
        az login --service-principal \
          -u $(ARM_CLIENT_ID) \
          -p $(ARM_CLIENT_SECRET) \
          --tenant $(ARM_TENANT_ID)

        az account set --subscription $(ARM_SUBSCRIPTION_ID)
      displayName: "Azure Login"

    # Terraform Init
    - script: |
        terraform init \
          -backend-config="resource_group_name=rg-tfstate" \
          -backend-config="storage_account_name=mystatefilegkinfra" \
          -backend-config="container_name=tfstate" \
          -backend-config="key=terraform.tfstate"
      displayName: "Terraform Init"

    # Apply
    - script: terraform apply -auto-approve tfplan
      displayName: "Terraform Apply"
